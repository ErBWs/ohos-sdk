name: build

on:
  workflow_dispatch:
    inputs:
      tag:
        required: true
        type: string
      draft:
        description: 'Whether creates a draft release'
        required: true
        type: boolean
        default: false
      windows_amd64_url:
        description: 'Windows amd64'
        required: true
        type: string
      windows_amd64_sha256:
        description: 'Windows amd64 sha256'
        required: true
        type: string
      linux_amd64_url:
        description: 'Linux amd64'
        required: true
        type: string
      linux_amd64_sha256:
        description: 'Linux amd64 sha256'
        required: true
        type: string
      macos_amd64_url:
        description: 'macOS Intel'
        required: true
        type: string
      macos_amd64_sha256:
        description: 'macOS Intel sha256'
        required: true
        type: string
      macos_arm64_url:
        description: 'macOS Apple Silicon'
        required: true
        type: string
      macos_arm64_sha256:
        description: 'macOS Apple Silicon sha256'
        required: true
        type: string

jobs:
  pack_and_release:
    name: Pack and Release
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Prepare Folders
        run: |
          mkdir -p dist
        shell: bash

      - name: Download Commandline Tools
        env:
          WIN_URL: ${{ inputs.windows_amd64_url }}
          WIN_SHA256: ${{ inputs.windows_amd64_sha256 }}
          LINUX_URL: ${{ inputs.linux_amd64_url }}
          LINUX_SHA256: ${{ inputs.linux_amd64_sha256 }}
          MAC_AMD_URL: ${{ inputs.macos_amd64_url }}
          MAC_AMD_SHA256: ${{ inputs.macos_amd64_sha256 }}
          MAC_ARM_URL: ${{ inputs.macos_arm64_url }}
          MAC_ARM_SHA256: ${{ inputs.macos_arm64_sha256 }}
        run: |
          download_and_verify() {
            local url="$1"
            local output="$2"
            local expected_sha="$3"
            local attempt

            for attempt in 1 2; do
              echo "Downloading $output (attempt $attempt/2)"
              rm -f "$output"
              curl -sSL "$url" -o "$output"

              if printf '%s  %s\n' "$expected_sha" "$output" | sha256sum -c -; then
                echo "Verified $output"
                return 0
              fi

              echo "Checksum verification failed for $output"
            done

            echo "Checksum verification failed after retry for $output" >&2
            return 1
          }

          download_and_verify "$WIN_URL" ohos-sdk-windows-amd64.zip "$WIN_SHA256"
          download_and_verify "$LINUX_URL" ohos-sdk-linux-amd64.zip "$LINUX_SHA256"
          download_and_verify "$MAC_AMD_URL" ohos-sdk-mac-amd64.zip "$MAC_AMD_SHA256"
          download_and_verify "$MAC_ARM_URL" ohos-sdk-mac-arm64.zip "$MAC_ARM_SHA256"
        shell: bash

      - name: Process and Split Linux
        run: |
          unzip ohos-sdk-linux-amd64.zip
          tar -czf ohos-sdk-linux-amd64.tar.gz command-line-tools/
          sha256sum ohos-sdk-linux-amd64.tar.gz > dist/ohos-sdk-linux-amd64.tar.gz.sha256
          split -b 1500m ohos-sdk-linux-amd64.tar.gz dist/ohos-sdk-linux-amd64.tar.gz.
          rm -rf command-line-tools/ ohos-sdk-linux-amd64.zip
        shell: bash

      - name: Generates sha256sum for Windows/macOS
        run: |
          for file in *.zip; do
            sha256sum "$file" > "dist/$file.sha256"
          done
        shell: bash

      - name: Process and Split Windows/macOS
        run: |
          split -b 1500m ohos-sdk-windows-amd64.zip dist/ohos-sdk-windows-amd64.zip.
          split -b 1500m ohos-sdk-mac-amd64.zip dist/ohos-sdk-mac-amd64.zip.
          split -b 1500m ohos-sdk-mac-arm64.zip dist/ohos-sdk-mac-arm64.zip.
        shell: bash

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          draft: ${{ inputs.draft }}
          files: dist/*
